name: Market Intelligence Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_snowflake.py

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 producer/ spark_jobs/ api/ --max-line-length=120 --ignore=E501,W503

      - name: Validate DAG syntax
        run: |
          pip install apache-airflow==2.8.0
          python -c "from dags.market_intelligence_dag import dag; print('DAG syntax valid')"

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker images
        run: |
          docker compose build superset
